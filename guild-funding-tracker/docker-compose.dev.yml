version: "3.9"
services:
  guild-funding-tracker:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: npx tsx watch src/index.ts
    env_file: .env.local
    volumes:
      - ./src:/app/src:ro
      - tracker_data_dev:/data
    environment:
      - NODE_ENV=development

volumes:
  tracker_data_dev:
