version: "3.9"
services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    env_file: .env
    volumes:
      - tracker_data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Authoritative test runner — uses the builder stage which has all dev deps
  # and compiles better-sqlite3 native bindings inside the container.
  # Run via: npm run docker:test  (or: docker compose run --rm test)
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: npm test

volumes:
  tracker_data:
    driver: local
