version: "3.9"
services:
  guild-funding-tracker:
    image: guild-funding-tracker:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - tracker_data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  tracker_data:
    driver: local
